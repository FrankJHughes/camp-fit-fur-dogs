services:
  - type: web
    name: campfitfurdogsapi
    runtime: docker
    plan: free
    autoDeploy: true

    # Dockerfile is at the repo root — no overrides needed
    buildCommand: ""
    startCommand: ""

    envVars:
      - key: ConnectionStrings__DefaultConnection
        fromSecret: production-db-connection-string
        previewValue: $PREVIEW_DB_CONNECTION_STRING

      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      - key: Frontend__BaseUrl
        fromSecret: production-ui-base-url
        previewValue: $PREVIEW_UI_BASE_URL

    healthCheckPath: /health
    healthCheckTimeout: 100
    healthCheckInterval: 10
    healthCheckGracePeriod: 30

    pullRequestPreviewsEnabled: true
    previewPlan: free
