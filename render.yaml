# Exported from Render on 2026-05-02T19:55:56Z
version: "1"
projects:
- name: Camp Fit Fur Dogs
  environments:
  - name: Production
    services:
    - type: web
      name: campfitfurdogsapi
      runtime: docker
      repo: https://github.com/FrankJHughes/camp-fit-fur-dogs
      plan: starter
      region: oregon
      healthCheckPath: /api/health
      dockerContext: .
      dockerfilePath: ./Dockerfile
      autoDeployTrigger: commit
      previews:
        generation: manual
      envVars:
        - key: ASPNETCORE_ENVIRONMENT
          value: "Production"
          previewValue: "Preview"

        - key: ConnectionStrings__DefaultConnection
          sync: false # do not copy to preview environment

        - key: Frontend:BaseUrl
          sync: false # do not copy to preview environment

        - key: GITHUB_PAT
          value: "secret" # access to the GitHub Artifacts hosting the preview environment variable overrides

        - key: Authentication__Callback__Oidc__ClientSecret
          value: "secret"

