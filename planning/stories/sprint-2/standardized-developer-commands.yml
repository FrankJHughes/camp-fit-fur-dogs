title: "Standardized Developer Commands"
epic: "Developer Onboarding"
points: 2
priority: P1
labels: [infra, developer-experience]
branch: chore/standardized-developer-commands
description: |
  As a developer, I want common tasks — build, test, run, clean — abstracted
  behind a discoverable command interface that behaves identically across
  cloud, local, and CI environments — so that I never memorize
  framework-specific CLI flags or multi-step sequences.

  CI workflows must use the same command interface with no duplicated
  build logic.
tasks:
  - Select and configure a task runner or command interface at repo root
  - Define standard targets — build, test, run, clean (minimum)
  - Add a help command that lists all targets with descriptions
  - Wire CI workflows to use the same command interface
  - Verify identical behavior across cloud, local, and CI
  - Document available commands in README
acceptance:
  - Command interface exists at repo root
  - Standard commands defined and functional
  - Help command lists targets with descriptions
  - CI uses the same interface with no duplicated logic
  - Commands behave identically across all environments
