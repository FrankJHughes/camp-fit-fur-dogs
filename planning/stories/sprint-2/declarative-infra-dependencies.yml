title: "Declarative Infrastructure Dependencies"
epic: "Developer Onboarding"
points: 3
priority: P1
labels: [infra, developer-experience]
branch: chore/declarative-infra-dependencies
description: |
  As a developer, I want infrastructure the application depends on —
  databases, caches, message brokers — defined in version-controlled,
  declarative configuration so that I never install these services manually
  and every environment runs the same versions.

  The same definitions must be reusable by the cloud dev environment,
  local setup, and CI.
tasks:
  - Define all infrastructure dependencies in a declarative config file
  - Add health checks so dependent processes can wait for readiness
  - Configure persistent storage across environment restarts
  - Document connection strings and ports via environment variables
  - Verify single-command start and stop lifecycle
  - Ensure definitions are reusable by cloud dev environment and CI
acceptance:
  - All dependencies defined in declarative configuration
  - Services include health checks
  - Data persists across restarts
  - Connection info is documented or discoverable
  - Start/stop works with a single command
  - Same definitions work in cloud, local, and CI
