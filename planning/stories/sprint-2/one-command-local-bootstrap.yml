title: "One-Command Local Bootstrap"
epic: "Developer Onboarding"
points: 3
priority: P0
labels: [infra, developer-experience]
branch: chore/one-command-local-bootstrap
description: |
  As a developer who prefers working locally, I want to run a single
  command that validates my environment, starts infrastructure services
  via container orchestration, builds the solution, runs the test suite,
  and prints a readiness report — so that I do not need to know the
  specific toolchain commands to get started.

  This is the primary onboarding path. Docker is a stated prerequisite.
  Infrastructure runs in containers using the same declarative definitions
  as the containerized environment (L2) and CI. Application code runs on
  the host with a natively installed SDK.
tasks:
  - Create bootstrap entry point for each supported OS
  - Add prerequisite validation including container runtime check
  - Start infrastructure services using shared declarative definitions
  - Call standardized task runner commands for restore, build, and test
  - Print human-readable readiness summary on completion
  - Verify idempotency
  - Document the bootstrap command as the primary getting-started path in README
acceptance:
  - A single command exists for each supported OS
  - Prerequisites including container runtime are validated with clear messages
  - Infrastructure starts using shared declarative definitions
  - Standardized commands handle restore, build, and test
  - Readiness summary prints pass/fail per check with elapsed time
  - Command is idempotent
