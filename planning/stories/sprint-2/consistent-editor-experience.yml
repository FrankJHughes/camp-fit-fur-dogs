title: "Consistent Editor Experience"
epic: "Developer Onboarding"
points: 2
priority: P2
labels: [infra, developer-experience]
branch: chore/consistent-editor-experience
description: |
  As a developer, I want formatting rules, debug profiles, recommended
  extensions, and workspace settings shipped with the repository — so that
  any supported editor produces a correct, productive experience from first
  open without manual configuration.
tasks:
  - Define code formatting and style rules in a portable editor config format
  - List recommended extensions in a discoverable location
  - Create a debug launch profile that starts the API with debugger attached
  - Define build and test tasks runnable from the editor
  - Configure format-on-save as a recommended workspace default
  - Reference editor configuration in the contribution guide
acceptance:
  - Formatting rules defined in a format supported by all major editors
  - Recommended extensions listed in a discoverable location
  - Debug launch profile starts the API with one action
  - Build and test tasks runnable without a terminal
  - Contribution guide references editor setup
