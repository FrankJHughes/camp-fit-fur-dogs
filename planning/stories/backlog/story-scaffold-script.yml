title: "Story Scaffold Tool"
epic: "Backlog Grooming Experience"
points: 3
priority: P0
labels: [infra, tooling, governance]
branch: "chore/story-scaffold-script"
description: |
  As a product owner, I want a tool that generates a matched pair of
  product spec and story artifact from minimal inputs — so that schema
  compliance is guaranteed by construction and hand-authoring is never
  required.
tasks:
  - Create scaffold tool at a discoverable, documented location
  - Accept minimal inputs sufficient to populate a story
  - Generate product spec and story artifact in their correct locations
  - Ensure generated artifacts match the existing schema on main
  - Include traceability from story artifact to product spec
  - Verify idempotency
  - Report created file paths on completion
  - Document usage in planning or contributor documentation
acceptance:
  - Tool exists and is documented
  - Generates matched product spec + story artifact from minimal inputs
  - Generated artifacts match existing schema with traceability
  - Tool is idempotent
