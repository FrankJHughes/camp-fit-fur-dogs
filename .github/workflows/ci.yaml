name: Build & Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    - cron: "0 9 * * *" # nightly full run

jobs:
  determine-changes:
    name: Determine Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      shared-kernel: ${{ steps.filter.outputs.shared-kernel }}
      infra: ${{ steps.filter.outputs.infra }}
      docs-only: ${{ steps.filter.outputs.docs-only }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/CampFitFurDogs.*/**'
              - 'tests/CampFitFurDogs.*/**'
            frontend:
              - 'frontend/**'
            shared-kernel:
              - 'src/SharedKernel*/**'
              - 'tests/SharedKernel*/**'
            infra:
              - '.github/**'
              - '*.sln'
              - 'Makefile'
              - 'docker-compose*'
            docs-only:
              - '*.md'
              - 'product/**'
              - 'docs/**'
              - 'LICENSE'
              - '.editorconfig'

  validate-ci-deps:
    name: Validate CI Dependency Graph
    runs-on: ubuntu-latest
    needs: determine-changes
    steps:
      - uses: actions/checkout@v4

      - name: Install validator dependencies
        run: npm install js-yaml

      - name: Validate CI Dependencies
        run: node scripts/ci/validate-ci-dependencies.mjs

  shared-kernel:
    name: SharedKernel Tests
    runs-on: ubuntu-latest
    needs: [determine-changes, validate-ci-deps]
    if: |
      github.ref == 'refs/heads/main' ||
      needs.determine-changes.outputs.shared-kernel == 'true' ||
      needs.determine-changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-dotnet-tests
        with:
          projects: |
            tests/SharedKernel.Tests
            tests/SharedKernel.Api.Tests
            tests/SharedKernel.Infrastructure.EntityFrameworkCore.Tests

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [determine-changes, validate-ci-deps, shared-kernel]
    if: |
      always() && !failure() && !cancelled() && (
        github.ref == 'refs/heads/main' ||
        needs.determine-changes.outputs.backend == 'true' ||
        needs.determine-changes.outputs.shared-kernel == 'true' ||
        needs.determine-changes.outputs.infra == 'true'
      )

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-dotnet-tests
        with:
          projects: |
            tests/CampFitFurDogs.Api.Tests
            tests/CampFitFurDogs.Application.Tests
            tests/CampFitFurDogs.Domain.Tests
            tests/CampFitFurDogs.Infrastructure.Tests
            tests/CampFitFurDogs.Api.Tests
            tests/CampFitFurDogs.Application.Tests
            tests/CampFitFurDogs.Domain.Tests
            tests/CampFitFurDogs.Infrastructure.Tests

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    needs: [determine-changes, validate-ci-deps, backend]
    if: |
      always() && !failure() && !cancelled() && (
        github.ref == 'refs/heads/main' ||
        needs.determine-changes.outputs.frontend == 'true' ||
        needs.determine-changes.outputs.backend == 'true' ||
        needs.determine-changes.outputs.infra == 'true'
      )

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Run frontend tests
        run: npm test --prefix frontend
