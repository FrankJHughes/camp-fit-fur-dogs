name: Build & Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:

  determine-changes:
    name: Determine Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      shared-kernel: ${{ steps.filter.outputs.shared-kernel }}
      infra: ${{ steps.filter.outputs.infra }}
      docs-only: ${{ steps.filter.outputs.docs-only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/CampFitFurDogs.*/**'
              - 'tests/CampFitFurDogs.*/**'
            frontend:
              - 'frontend/**'
            shared-kernel:
              - 'src/Frank*/**'
              - 'tests/Frank*/**'
            infra:
              - '.github/**'
              - '*.slnx'
              - 'Makefile'
              - 'docker-compose*'
            docs-only:
              - '*.md'
              - 'product/**'
              - 'docs/**'
              - 'LICENSE'
              - '.editorconfig'

  validate-ci-deps:
    name: Validate CI Dependency Graph
    runs-on: ubuntu-latest
    needs: determine-changes
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install validator dependencies
        run: pnpm add js-yaml

      - name: Validate CI Dependencies
        run: node scripts/ci/validate-ci-dependencies.mjs

  shared-kernel:
    name: SharedKernel Tests
    runs-on: ubuntu-latest
    needs: [determine-changes, validate-ci-deps]
    if: |
      github.ref == 'refs/heads/main' ||
      needs.determine-changes.outputs.shared-kernel == 'true' ||
      needs.determine-changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          cache: false

      - name: Restore dependencies
        run: dotnet restore CampFitFurDogs.slnx

      - uses: ./.github/actions/run-dotnet-tests
        with:
          projects: |
            tests/Frank.Tests
            tests/Frank.Api.Tests
            tests/Frank.Infrastructure.EntityFrameworkCore.Tests

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [determine-changes, validate-ci-deps, shared-kernel]
    if: |
      always() && !failure() && !cancelled() && (
        github.ref == 'refs/heads/main' ||
        needs.determine-changes.outputs.backend == 'true' ||
        needs.determine-changes.outputs.shared-kernel == 'true' ||
        needs.determine-changes.outputs.infra == 'true'
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          cache: false

      - name: Restore dependencies
        run: dotnet restore CampFitFurDogs.slnx

      - uses: ./.github/actions/run-dotnet-tests
        with:
          projects: |
            tests/CampFitFurDogs.Api.Tests
            tests/CampFitFurDogs.Application.Tests
            tests/CampFitFurDogs.Domain.Tests
            tests/CampFitFurDogs.Infrastructure.Tests
            tests/CampFitFurDogs.Integration.Tests

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [determine-changes, validate-ci-deps, backend]
    if: |
      always() && !failure() && !cancelled() && (
        github.ref == 'refs/heads/main' ||
        needs.determine-changes.outputs.frontend == 'true' ||
        needs.determine-changes.outputs.backend == 'true' ||
        needs.determine-changes.outputs.infra == 'true'
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test --run
