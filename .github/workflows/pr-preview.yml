name: PR Preview with Neon + Render

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:

  preview_environment:
    name: Create Neon Preview Environment + Build Image + Deploy API Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    outputs:
      preview_url: ${{ steps.render_preview.outputs.preview_url }}
      preview_id: ${{ steps.render_preview.outputs.preview_id }}
      neon_branch: ${{ steps.neon_branch.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Compute Neon branch name
        id: neon_branch
        run: echo "value=preview/pr-${{ github.event.number }}-${{ steps.branch_name.outputs.current_branch }}" >> $GITHUB_OUTPUT

      - name: Get expiration date (2 weeks from now)
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      # ============================
      # NEON PREVIEW DB
      # ============================

      - name: Delete Neon Branch if exists
        continue-on-error: true
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ steps.neon_branch.outputs.value }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ steps.neon_branch.outputs.value }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}
      # - run: echo db_url ${{ steps.create_neon_branch.outputs.db_url }} # the password is masked when printed
      # - run: echo host ${{ steps.create_neon_branch.outputs.db_host }}
      # - run: echo branch_id ${{ steps.create_neon_branch.outputs.branch_id }}

      - name: Convert Neon URL to .NET connection string
        id: convert_conn
        run: |
          HOST="${{ steps.create_neon_branch.outputs.db_host }}"
          PORT="5432"
          DB="neondb"
          USER="neondb_owner"
          PASS="${{ steps.create_neon_branch.outputs.password }}"

          # DO NOT echo the connection string
          {
            echo "ConnectionStrings__DefaultConnection=Host=$HOST;Port=$PORT;Database=$DB;Username=$USER;Password=$PASS;Ssl Mode=Require;Trust Server Certificate=true;"
          } >> $GITHUB_ENV

      # ============================
      # BUILD & PUSH DOCKER IMAGE
      # ============================

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build API image
        run: docker build -t ghcr.io/frankjhughes/campfitfurdogs/api:${{ github.sha }} .

      - name: Push API image
        run: docker push ghcr.io/frankjhughes/campfitfurdogs/api:${{ github.sha }}

      - name: Export image tag
        run: echo "IMAGE_TAG=ghcr.io/frankjhughes/campfitfurdogs/api:${{ github.sha }}" >> $GITHUB_ENV

      # ============================
      # APPLY MIGRATIONS
      # ============================

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore solution
        run: dotnet restore

      - name: Apply EF Core Migrations
        # env:
        #   ConnectionStrings__DefaultConnection: ${{ env.ConnectionStrings__DefaultConnection }}
        run: dotnet ef database update -s src/CampFitFurDogs.Api -p src/CampFitFurDogs.Infrastructure

      - name: Run Infrastructure Integration Tests
        # env:
        #   ConnectionStrings__DefaultConnection: ${{ env.ConnectionStrings__DefaultConnection }}
        run: dotnet test tests/CampFitFurDogs.Infrastructure.IntegrationTests --logger "trx"

      # ============================
      # RENDER PREVIEW (image-backed)
      # ============================

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Trigger Render PR Preview
        id: render_preview
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          PAYLOAD=$(jq -n \
            --arg image "${{ env.IMAGE_TAG }}" \
            --arg conn "${{ env.ConnectionStrings__DefaultConnection }}" \
            '{
              imagePath: $image,
              plan: "starter",
              envVars: [
                { key: "ConnectionStrings__DefaultConnection", value: $conn }
              ]
            }')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_API }}/preview" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Render API status: $STATUS"
          echo "Render API response: $BODY"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Failed to create Render preview"
            exit 1
          fi

          PREVIEW_URL=$(echo "$BODY" | jq -r '.service.url')
          PREVIEW_ID=$(echo "$BODY" | jq -r '.id')

          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "preview_id=$PREVIEW_ID" >> $GITHUB_OUTPUT

  # ============================
  # API INTEGRATION TESTS
  # ============================

  api_integration_tests:
    name: API Integration Tests (Render Preview)
    needs: preview_environment
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: ${{ needs.preview_environment.outputs.preview_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Wait for API preview to be ready
        run: |
          echo "Waiting for API preview to be ready at: $API_BASE_URL"

          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_BASE_URL/health")

            if [ "$STATUS" -eq 200 ]; then
              echo "API preview is ready"
              exit 0
            fi

            echo "Waiting for API preview to be ready... (attempt $i/30)"
            sleep 10
          done

          echo "API preview did not become ready in time"
          exit 1

      - name: Run API Integration Tests
        run: dotnet test tests/CampFitFurDogs.Api.IntegrationTests --logger "trx"

  # ============================
  # CLEANUP (Neon + Render)
  # ============================

  cleanup:
    if: always() && github.event.action == 'closed'
    runs-on: ubuntu-latest
    needs: preview_environment

    steps:
      - name: Delete Neon Branch (retry)
        run: |
          for i in {1..5}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ needs.preview_environment.outputs.neon_branch }}" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}")

            if [ "$RESPONSE" -eq 204 ] || [ "$RESPONSE" -eq 404 ]; then
              echo "Neon branch deleted"
              exit 0
            fi

            echo "Neon delete failed with $RESPONSE, retrying..."
            sleep 5
          done

          echo "Failed to delete Neon branch after retries"
          exit 1

      - name: Delete Render PR Preview
        run: |
          echo "Deleting Render preview: ${{ needs.preview_environment.outputs.preview_id }}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X DELETE \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_API }}/preview/${{ needs.preview_environment.outputs.preview_id }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Render API status: $STATUS"
          echo "Render API response: $BODY"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Failed to delete Render preview"
            exit 1
          fi

          echo "Preview deleted successfully"
