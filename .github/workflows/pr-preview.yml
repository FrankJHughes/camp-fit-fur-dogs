name: PR Preview with Neon + Render

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:

  preview_environment:
    name: Create Neon Preview Environment + Deploy API
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Get expiration date (2 weeks from now)
        id: expiration
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      # ⭐ Always delete the preview branch first (supports fixing bad migrations)
      - name: Delete Neon Branch if exists
        continue-on-error: true
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ steps.branch_name.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      # ⭐ Create a fresh Neon preview branch every run
      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ steps.branch_name.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Convert Neon URL to .NET connection string
        id: convert
        run: |
          RAW_URL="${{ steps.create_neon_branch.outputs.db_url }}"
          URL_NO_SCHEME="${RAW_URL#postgres://}"
          URL_NO_SCHEME="${URL_NO_SCHEME#postgresql://}"

          USERPASS="${URL_NO_SCHEME%@*}"
          HOSTDB="${URL_NO_SCHEME#*@}"

          USER="${USERPASS%%:*}"
          PASS="${USERPASS#*:}"

          HOST="${HOSTDB%%/*}"
          DB="${HOSTDB#*/}"

          CONNECTION_STRING="Host=$HOST;Port=5432;Database=$DB;Username=$USER;Password=$PASS;Ssl Mode=Require;Trust Server Certificate=true;"

          echo "ConnectionStrings__DefaultConnection=$CONNECTION_STRING" >> $GITHUB_ENV

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore solution
        run: dotnet restore

      # ⭐ Workflow owns migrations — tests do NOT run migrations
      - name: Apply EF Core Migrations
        run: dotnet ef database update -s src/CampFitFurDogs.Api -p src/CampFitFurDogs.Infrastructure

      - name: Run Infrastructure Integration Tests
        run: dotnet test tests/CampFitFurDogs.Infrastructure.IntegrationTests --logger "trx"

      # ⭐ Render Free Tier: Create PR Preview with envVars in payload
      - name: Trigger Render PR Preview (correct endpoint)
        id: render_preview
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/previews" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"serviceId\": \"${{ secrets.RENDER_SERVICE_ID_API }}\",
              \"commit\": \"${{ github.sha }}\",
              \"envVars\": {
                \"ConnectionStrings__DefaultConnection\": \"${{ env.ConnectionStrings__DefaultConnection }}\"
              }
            }")

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Render API status: $STATUS"
          echo "Render API response: $BODY"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Failed to create Render preview"
            exit 1
          fi

          PREVIEW_URL=$(echo "$BODY" | jq -r '.service.url')
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
          echo "::set-output name=preview_url::$PREVIEW_URL"
    outputs:
      preview_url: ${{ steps.render_preview.outputs.preview_url }}

  api_integration_tests:
    name: API Integration Tests (Render Preview)
    needs: preview_environment
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: ${{ needs.preview_environment.outputs.preview_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Wait for API preview to be ready
        run: |
          echo "Waiting for API preview to be ready at: $PREVIEW_URL"

          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PREVIEW_URL/health")

            if [ "$STATUS" -eq 200 ]; then
              echo "API preview is ready"
              exit 0
            fi

            echo "Waiting for API preview to be ready... (attempt $i/30)"
            sleep 10
          done

          echo "API preview did not become ready in time"
          exit 1

      - name: Run API Integration Tests
        run: dotnet test tests/CampFitFurDogs.Api.IntegrationTests --logger "trx"

  cleanup:
    name: Cleanup Neon + Render Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Get Branch Name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ steps.branch_name.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Delete Render PR Preview Instance
        run: |
          curl -X DELETE \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_API }}/previews/pr-${{ github.event.number }}"
