name: Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  preview_context:
    name: Preview Context
    runs-on: ubuntu-latest
    outputs:
      common_prefix: ${{ steps.out.outputs.common_prefix }}
      artifact_name: ${{ steps.out.outputs.artifact_name }}
      artifact_file_path: ${{ steps.out.outputs.artifact_file_path }}
      db_branch: ${{ steps.out.outputs.db_branch }}
      api_base_url: ${{ steps.out.outputs.api_base_url }}
      api_live_endpoint: "/api/dogs"
      should_destroy: ${{ steps.out.outputs.should_destroy }}
      should_deploy: ${{ steps.out.outputs.should_deploy }}
    steps:
      - id: out
        run: |
          common_prefix="pr-${{ github.event.pull_request.number }}"
          echo "common_prefix=$common_prefix" >> $GITHUB_OUTPUT
          echo "artifact_name=$common_prefix" >> $GITHUB_OUTPUT
          echo "artifact_file_path=db-conn.txt" >> $GITHUB_OUTPUT
          echo "db_branch=$common_prefix" >> $GITHUB_OUTPUT
          echo "api_base_url=https://campfitfurdogsapi-$common_prefix.onrender.com" >> $GITHUB_OUTPUT

          action="${{ github.event.action }}"
          should_destroy=$([[ "$action" != "opened" ]] && echo "true" || echo "false")
          should_deploy=$([[ "$action" != "closed" ]] && echo "true" || echo "false")
          echo "should_destroy=$should_destroy" >> $GITHUB_OUTPUT
          echo "should_deploy=$should_deploy" >> $GITHUB_OUTPUT

  destroy_stale_api:
    name: Destroy Stale API
    runs-on: ubuntu-latest
    needs: preview_context
    if: needs.preview_context.outputs.should_destroy == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/wait-for-endpoint
        with:
          url: "${{ needs.preview_context.outputs.api_base_url }}/health"
          healthy: "404"
          timeout: 300
          consecutive_successes_required: 3
          adjective: "down"

  destroy_stale_artifact:
    name: Destroy Stale Artifact
    runs-on: ubuntu-latest
    needs: preview_context
    if: needs.preview_context.outputs.should_destroy == 'true'
    steps:
      - uses: geekyeggo/delete-artifact@v6
        with:
          name: ${{ needs.preview_context.outputs.artifact_name }}

  destroy_stale_db:
    name: Destroy Stale DB
    runs-on: ubuntu-latest
    needs: preview_context
    if: needs.preview_context.outputs.should_destroy == 'true'
    steps:
      - uses: neondatabase/delete-branch-action@v3
        continue-on-error: true
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ needs.preview_context.outputs.db_branch }}

  destroy_stale_frontend:
    name: Destroy Stale Frontend
    runs-on: ubuntu-latest
    needs: preview_context
    if: needs.preview_context.outputs.should_destroy == 'true'
    env:
      VERCEL_PAT: ${{ secrets.VERCEL_PAT }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - name: Remove stale Vercel deployments
        run: |
          echo "Checking for stale Vercel deployments…"

          deployments=$(vercel list --token "$VERCEL_PAT" --scope "$VERCEL_ORG_ID" \
            | grep "pr-${{ github.event.pull_request.number }}" \
            | awk '{print $1}' || true)

          if [ -z "$deployments" ]; then
            echo "No stale Vercel deployments found."
            exit 0
          fi

          echo "Found stale deployments:"
          echo "$deployments"

          for d in $deployments; do
            echo "Removing $d…"
            vercel remove "$d" --yes --token "$VERCEL_PAT" --scope "$VERCEL_ORG_ID"
          done

          echo "Stale Vercel deployments removed."

  deploy_fresh_frontend:
    name: Deploy Fresh Frontend
    runs-on: ubuntu-latest
    needs:
      - preview_context
      - destroy_stale_frontend
    if: needs.preview_context.outputs.should_deploy == 'true'
    outputs:
      vercel_preview_url: ${{ steps.deploy.outputs.preview_url }}
    env:
      VERCEL_PAT: ${{ secrets.VERCEL_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        id: deploy
        working-directory: frontend
        run: |
          url=$(vercel deploy \
            --yes \
            --token "$VERCEL_PAT" \
            --build-env NEXT_PUBLIC_API_BASE_URL="https://campfitfurdogsapi-pr-${{ github.event.pull_request.number }}.onrender.com")

          echo "$url"
          echo "preview_url=$url" >> $GITHUB_OUTPUT

      - name: Write Frontend URL Artifact
        run: echo "${{ steps.deploy.outputs.preview_url }}" > frontend-url.txt

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.preview_context.outputs.artifact_name }}
          path: frontend-url.txt

  deploy_fresh_db:
    name: Deploy Fresh DB
    runs-on: ubuntu-latest
    needs:
      - preview_context
      - destroy_stale_db
      - deploy_fresh_frontend
    if: needs.preview_context.outputs.should_deploy == 'true'
    outputs:
      db_conn_string: ${{ steps.conn.outputs.npgsql_connection_string }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute Expiration
        id: exp
        run: echo "expiration=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Create Neon Branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ needs.preview_context.outputs.db_branch }}
          expires_at: ${{ steps.exp.outputs.expiration }}

      - name: Convert PostgreSQL URI to Npgsql Connection String
        id: conn
        uses: ./.github/actions/postgres-uri-to-npgsql-connection-string
        with:
          postgres_uri: ${{ steps.neon.outputs.db_url }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet tool install --global dotnet-ef
      - run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      - run: dotnet restore

      - name: Apply Migrations
        run: |
          ConnectionStrings__DefaultConnection="${{ steps.conn.outputs.npgsql_connection_string }}" \
          dotnet ef database update -s src/CampFitFurDogs.Api -p src/CampFitFurDogs.Infrastructure

      - name: Run DB Tests
        run: |
          ConnectionStrings__DefaultConnection="${{ steps.conn.outputs.npgsql_connection_string }}" \
          dotnet test integration-tests/CampFitFurDogs.Infrastructure.IntegrationTests --logger "trx"

      - name: Write DB Artifact
        run: echo "${{ steps.conn.outputs.npgsql_connection_string }}" > db-conn.txt

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.preview_context.outputs.artifact_name }}
          path: db-conn.txt

  deploy_fresh_api:
    name: Deploy Fresh API
    runs-on: ubuntu-latest
    needs:
      - preview_context
      - deploy_fresh_db
      - deploy_fresh_frontend
      - destroy_stale_api
    if: needs.preview_context.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Add render-preview label
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "render-preview"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Wait for API
        uses: ./.github/actions/wait-for-endpoint
        with:
          url: "${{ needs.preview_context.outputs.api_base_url }}${{ needs.preview_context.outputs.api_live_endpoint }}"
          healthy: "200,400,401"
          timeout: 360
          adjective: "up"
          consecutive_successes_required: 3

      - name: Test API
        run: |
          API_BASE_URL=${{ needs.preview_context.outputs.api_base_url }} \
          dotnet test integration-tests/CampFitFurDogs.Api.IntegrationTests --logger "trx"
