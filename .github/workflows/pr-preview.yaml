name: PR Preview with Neon + Render

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:

  preview_environment:
    name: Create Neon Preview Environment + Export Preview Connection String
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    outputs:
      neon_branch: ${{ steps.neon_branch.outputs.value }}
      preview_connection_string: ${{ steps.convert_conn.outputs.conn_string }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Compute Neon branch name
        id: neon_branch
        run: echo "value=preview/pr-${{ github.event.number }}-${{ steps.branch_name.outputs.current_branch }}" >> $GITHUB_OUTPUT

      - name: Get expiration date (2 weeks from now)
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      # ============================
      # NEON PREVIEW DB
      # ============================

      - name: Delete Neon Branch if exists
        continue-on-error: true
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ steps.neon_branch.outputs.value }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ steps.neon_branch.outputs.value }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Convert Neon URL to .NET connection string
        id: convert_conn
        run: |
          HOST="${{ steps.create_neon_branch.outputs.db_host }}"
          PASS="${{ steps.create_neon_branch.outputs.password }}"

          CONN="Host=$HOST;Port=5432;Database=neondb;Username=neondb_owner;Password=$PASS;Ssl Mode=Require;Trust Server Certificate=true;"

          echo "conn_string=$CONN" >> $GITHUB_OUTPUT
          echo "PREVIEW_CONNECTION_STRING=$CONN" >> $GITHUB_ENV

      # ============================
      # APPLY MIGRATIONS
      # ============================

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore solution
        run: dotnet restore

      - name: Apply EF Core Migrations
        run: |
          ConnectionStrings__DefaultConnection="${{ steps.convert_conn.outputs.conn_string }}" \
          dotnet ef database update -s src/CampFitFurDogs.Api -p src/CampFitFurDogs.Infrastructure

      - name: Run Infrastructure Integration Tests
        run: |
          ConnectionStrings__DefaultConnection="${{ steps.convert_conn.outputs.conn_string }}" \
          dotnet test tests/CampFitFurDogs.Infrastructure.IntegrationTests --logger "trx"

  # ============================
  # API INTEGRATION TESTS
  # ============================

  api_integration_tests:
    name: API Integration Tests (Render PR Preview)
    needs: preview_environment
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Wait for Render PR Preview URL
        id: wait_preview
        run: |
          echo "Waiting for Render PR Preview URL..."

          for i in {1..30}; do
            URL=$(gh pr view ${{ github.event.number }} --json statusCheckRollup | jq -r '.statusCheckRollup[]?.detailsUrl | select(. != null) | select(contains("onrender.com"))' | head -n 1)

            if [ -n "$URL" ]; then
              echo "preview_url=$URL" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Waiting for preview URL... (attempt $i/30)"
            sleep 10
          done

          echo "Preview URL not found"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for API preview to be ready
        run: |
          URL="${{ steps.wait_preview.outputs.preview_url }}"
          echo "Preview URL: $URL"

          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")

            if [ "$STATUS" -eq 200 ]; then
              echo "API preview is ready"
              exit 0
            fi

            echo "Waiting for API preview to be ready... (attempt $i/30)"
            sleep 10
          done

          echo "API preview did not become ready in time"
          exit 1

      - name: Run API Integration Tests
        env:
          API_BASE_URL: ${{ steps.wait_preview.outputs.preview_url }}
        run: dotnet test tests/CampFitFurDogs.Api.IntegrationTests --logger "trx"

  # ============================
  # CLEANUP
  # ============================

  cleanup:
    if: always() && github.event.action == 'closed'
    runs-on: ubuntu-latest
    needs: preview_environment

    steps:
      - name: Delete Neon Branch (retry)
        run: |
          for i in {1..5}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ needs.preview_environment.outputs.neon_branch }}" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}")

            if [ "$RESPONSE" -eq 204 ] || [ "$RESPONSE" -eq 404 ]; then
              echo "Neon branch deleted"
              exit 0
            fi

            echo "Neon delete failed with $RESPONSE, retrying..."
            sleep 5
          done

          echo "Failed to delete Neon branch after retries"
          exit 1
