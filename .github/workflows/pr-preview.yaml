name: Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  api_vars:
    name: API Vars
    runs-on: ubuntu-latest
    outputs:
      base_url: ${{ steps.set_base_url.outputs.base_url }}
    steps:
      - id: set_base_url
        run: echo "base_url=https://campfitfurdogsapi-pr-${{ github.event.pull_request.number }}.onrender.com" >> $GITHUB_OUTPUT

  destroy_api_preview:
    name: Remove Previous API Preview
    if: github.event.action != 'opened' # Don't attempt to delete a preview on the initial PR creation, as it won't exist yet
    runs-on: ubuntu-latest
    needs:
      - api_vars
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render PR Preview Removal
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "render-preview"

      - name: Wait for Previous PR Preview Removal to Complete
        env:
          api_base_url: ${{ needs.api_vars.outputs.base_url }}
        run: |
          echo "Waiting up to 3m for previous PR preview removal to complete..."
          for i in {1..36}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$api_base_url/health")
            if [ "$status" = "404" ]; then
              echo "Previous PR preview removal is complete."
              exit 0
            fi
            echo "Previous PR preview is still being removed (status: $status). Retrying in 5s..."
            sleep 5
          done
          echo "Previous PR preview was not removed in time."
          exit 1

  deploy_db_preview:
    name: Deploy DB Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ github.event.pull_request.number }}
      neon_branch: ${{ steps.neon_branch.outputs.value }}
      preview_connection_string: ${{ steps.convert_conn.outputs.conn_string }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Compute Neon branch name
        id: neon_branch
        run: echo "value=preview/PR-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Get expiration date (2 weeks from now)
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      # ============================
      # NEON PREVIEW DB
      # ============================

      - name: Delete Neon Branch if exists
        continue-on-error: true
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ steps.neon_branch.outputs.value }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ steps.neon_branch.outputs.value }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Convert Neon URL to .NET connection string
        id: convert_conn
        run: |
          HOST="${{ steps.create_neon_branch.outputs.db_host }}"
          PASS="${{ steps.create_neon_branch.outputs.password }}"

          CONN="Host=$HOST;Port=5432;Database=neondb;Username=neondb_owner;Password=$PASS;Ssl Mode=Require;Trust Server Certificate=true;"

          echo "conn_string=$CONN" >> $GITHUB_OUTPUT
          echo "$CONN" > db-conn.txt

      - name: Create DB Conn Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pr-${{ github.event.pull_request.number }}
          path: db-conn.txt
          overwrite: true
          retention-days: 7
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`

      # ============================
      # APPLY MIGRATIONS + INFRA INTEGRATION TESTS
      # ============================

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore solution
        run: dotnet restore

      - name: Apply EF Core Migrations
        run: |
          ConnectionStrings__DefaultConnection="${{ steps.convert_conn.outputs.conn_string }}" \
          dotnet ef database update -s src/CampFitFurDogs.Api -p src/CampFitFurDogs.Infrastructure

      - name: Test DB Preview
        run: |
          ConnectionStrings__DefaultConnection="${{ steps.convert_conn.outputs.conn_string }}" \
          dotnet test integration-tests/CampFitFurDogs.Infrastructure.IntegrationTests --logger "trx"

  deploy_api_preview:
    name: Deploy API Preview
    needs:
      - destroy_api_preview
      - api_vars
      - deploy_db_preview
    if: github.event.action != 'closed' && github.event.action != 'opened' # No need to wait if the PR was just opened (no preview to remove) or closed (we're not creating a new preview)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add "render-preview" Label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "render-preview"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

  test_api_preview:
    name: Test API Preview
    needs:
      - deploy_api_preview
      - api_vars
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run API Integration Tests
        env:
          API_BASE_URL: ${{ needs.api_vars.outputs.base_url }}
        run: |
          echo "$API_BASE_URL"
          dotnet test integration-tests/CampFitFurDogs.Api.IntegrationTests --logger "trx"

  cleanup:
    if: always() && github.event.action == 'closed'
    runs-on: ubuntu-latest
    needs: deploy_db_preview

    steps:
      - name: Delete DB Conn Artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NAME: "pr-${{ needs.deploy_db_preview.outputs.pr_number }}"
        run: |
          artifacts=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name == "'"$PR_NAME"'") | .id')

          if [ -n "$artifacts" ]; then
            for id in $artifacts; do
              echo "Deleting artifact $id for $PR_NAME"
              gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$id
            done
          else
            echo "No preview artifact found for $PR_NAME"
          fi

      - name: Delete Neon Branch (retry)
        run: |
          for i in {1..5}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "https://console.neon.tech/api/v2/projects/${{ vars.NEON_PROJECT_ID }}/branches/${{ needs.deploy_db_preview.outputs.neon_branch }}" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}")

            if [ "$RESPONSE" -eq 204 ] || [ "$RESPONSE" -eq 404 ]; then
              echo "Neon branch deleted"
              exit 0
            fi

            echo "Neon delete failed with $RESPONSE, retrying..."
            sleep 5
          done

          echo "Failed to delete Neon branch after retries"
          exit 1
