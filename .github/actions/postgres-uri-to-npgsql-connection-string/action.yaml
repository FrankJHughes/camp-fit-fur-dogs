name: Convert PostgreSQL URI to Npgsql Connection String
description: Convert a PostgreSQL URI (postgres://...) into an Npgsql/ADO.NET keyword-value connection string.

inputs:
  postgres_uri:
    description: "PostgreSQL URI (postgres://user:pass@host:port/db?sslmode=require)"
    required: true

  pooling:
    description: "Enable connection pooling (true/false). Default: true"
    required: false
    default: "true"

  timeout:
    description: "Connection timeout in seconds. Default: 15"
    required: false
    default: "15"

  ssl_mode:
    description: "Override SSL Mode (Require/Disable/Prefer). Default: Require"
    required: false
    default: "Require"

outputs:
  npgsql_connection_string:
    description: "The constructed Npgsql/ADO.NET connection string"
    value: ${{ steps.convert.outputs.npgsql_connection_string }}

runs:
  using: "composite"
  steps:
    - id: convert
      shell: bash
      run: |
        uri="${{ inputs.postgres_uri }}"

        # --- VALIDATION -------------------------------------------------------
        if [[ ! "$uri" =~ ^postgres:// ]]; then
          echo "ERROR: Input is not a valid PostgreSQL URI: $uri"
          exit 1
        fi

        if ! echo "$uri" | grep -q "@"; then
          echo "ERROR: PostgreSQL URI missing credentials or host section."
          exit 1
        fi

        # --- PARSE URI --------------------------------------------------------
        creds="$(echo "$uri" | sed -E 's#.*://([^@]+)@.*#\1#')"
        user="$(echo "$creds" | cut -d: -f1)"
        pass="$(echo "$creds" | cut -d: -f2)"

        hostport="$(echo "$uri" | sed -E 's#.*@([^/]+)/.*#\1#')"
        host="$(echo "$hostport" | cut -d: -f1)"
        port="$(echo "$hostport" | cut -d: -f2)"

        db="$(echo "$uri" | sed -E 's#.*/([^?]+)\?.*#\1#')"

        sslmode_input="${{ inputs.ssl_mode }}"
        pooling="${{ inputs.pooling }}"
        timeout="${{ inputs.timeout }}"

        # --- CONSTRUCT CONNECTION STRING --------------------------------------
        conn="Host=$host;Port=$port;Database=$db;Username=$user;Password=$pass;"
        conn+="Ssl Mode=$sslmode_input;Trust Server Certificate=true;"
        conn+="Pooling=$pooling;Timeout=$timeout;"

        echo "npgsql_connection_string=$conn" >> $GITHUB_OUTPUT
